name: Release Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号，例如 v4.2.0'
        required: true
        default: 'dev'
      push:
        description: '是否推送到 Docker Hub？选 false 则只构建不推送'
        type: boolean
        required: false
        default: false
      platforms:
        description: '目标平台（逗号分隔）'
        required: false
        default: 'linux/amd64,linux/arm64'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: app
            file: docker/Dockerfile.app
            repo: retainpdf-app
          - name: web
            file: docker/Dockerfile.web
            repo: retainpdf-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub namespace
        id: hub
        run: |
          user="${{ secrets.DOCKERHUB_USERNAME }}"
          if [ -z "$user" ]; then
            user="${GITHUB_REPOSITORY_OWNER}"
          fi
          echo "user=${user}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.hub.outputs.user }}/${{ matrix.target.repo }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

      - name: Login to Docker Hub
        if: inputs.push || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate build args
        id: build-args
        run: |
          {
            for var in http_proxy https_proxy HTTP_PROXY HTTPS_PROXY ALL_PROXY TYPST_VERSION; do
              val="$(printenv "$var" || true)"
              if [ -n "$val" ]; then
                echo "${var}=${val}"
              fi
            done
          } > /tmp/build-args.txt
          {
            echo 'args<<EOF'
            cat /tmp/build-args.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target.file }}
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ inputs.push || github.event_name == 'push' }}
          build-args: ${{ steps.build-args.outputs.args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
